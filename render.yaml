services:
  - type: web
    name: company-lead-parser-lite
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: company-lead-parser-lite-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: TWOGIS_API_KEY
        sync: false
      - key: DATA_LICENSE_ACKNOWLEDGED
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false

databases:
  - name: company-lead-parser-lite-db
    plan: free
    databaseName: leadparser
    user: leadparser
